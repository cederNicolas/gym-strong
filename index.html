<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strong Gym — Crezcamos Juntos</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0A0A0A;
      color: #fff;
      overflow-x: hidden;
    }

    /* Responsive nav */
    @media (max-width: 768px) {
      .nav-links-desktop { display: none !important; }
      .nav-mobile-btn { display: flex !important; }
      .loc-grid { grid-template-columns: 1fr !important; }
      .footer-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    }
    @media (min-width: 769px) {
      .nav-mobile-menu { display: none !important; }
    }

    /* Fade-in on scroll */
    .fade-in {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* WhatsApp floating button */
    .wa-float {
      position: fixed; bottom: 24px; right: 24px; z-index: 200;
      width: 56px; height: 56px; border-radius: 50%;
      background: #25D366; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(37, 211, 102, 0.4);
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      text-decoration: none;
    }
    .wa-float:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 24px rgba(37, 211, 102, 0.5);
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- WhatsApp floating button -->

     target="_blank" rel="noopener">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>

  <!-- Components -->
  <script type="text/babel" src="ui_kits/website/Navbar.jsx"></script>
  <script type="text/babel" src="ui_kits/website/Hero.jsx"></script>
  <script type="text/babel" src="ui_kits/website/Activities.jsx"></script>
  <script type="text/babel" src="ui_kits/website/WhyChooseUs.jsx"></script>
  <script type="text/babel" src="ui_kits/website/Schedule.jsx"></script>
  <script type="text/babel" src="ui_kits/website/Pricing.jsx"></script>
  <script type="text/babel" src="ui_kits/website/Testimonials.jsx"></script>
  <script type="text/babel" src="ui_kits/website/Location.jsx"></script>
  <script type="text/babel" src="ui_kits/website/Footer.jsx"></script>

  <script type="text/babel">
    function App() {
      React.useEffect(() => {
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                entry.target.classList.add('visible');
              }
            });
          },
          { threshold: 0.1, rootMargin: '0px 0px -40px 0px' }
        );

        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
        return () => observer.disconnect();
      }, []);

      return (
        <React.Fragment>
          <Navbar />
          <Hero />
          <Activities />
          <WhyChooseUs />
          <Schedule />
          <Pricing />
          <Testimonials />
          <Location />
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
