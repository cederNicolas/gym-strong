<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  body { margin: 0; padding: 24px 28px; background: #0A0A0A; font-family: 'Montserrat', sans-serif; color: #fff; }
  .scale { display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .label { font-size: 10px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.1em; width: 52px; flex-shrink: 0; text-align: right; padding-top: 2px; }
  .sample { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .divider { border: none; border-top: 1px solid #2A2A2A; margin: 4px 0; }
</style>
</head>
<body>
  <div class="scale">
    <div class="row"><span class="label">8XL 96</span><span class="sample" style="font-size:52px;font-weight:900;letter-spacing:-0.02em;line-height:1;">STRONG</span></div>
    <div class="row"><span class="label">7XL 72</span><span class="sample" style="font-size:42px;font-weight:900;letter-spacing:-0.02em;line-height:1;">STRONG</span></div>
    <div class="row"><span class="label">6XL 60</span><span class="sample" style="font-size:36px;font-weight:900;letter-spacing:-0.02em;line-height:1;">CREZCAMOS</span></div>
    <div class="row"><span class="label">5XL 48</span><span class="sample" style="font-size:30px;font-weight:700;line-height:1.1;">JUNTOS</span></div>
    <div class="row"><span class="label">4XL 36</span><span class="sample" style="font-size:24px;font-weight:700;line-height:1.1;">Membresía Libre</span></div>
    <hr class="divider">
    <div class="row"><span class="label">3XL 30</span><span class="sample" style="font-size:20px;font-weight:700;line-height:1.2;">Por qué elegirnos</span></div>
    <div class="row"><span class="label">2XL 24</span><span class="sample" style="font-size:17px;font-weight:600;line-height:1.2;">Horarios amplios</span></div>
    <div class="row"><span class="label">XL 20</span><span class="sample" style="font-size:15px;font-weight:600;line-height:1.3;">Profes siempre presentes</span></div>
    <div class="row"><span class="label">LG 18</span><span class="sample" style="font-size:14px;font-weight:400;line-height:1.5;">Entrenamos con vos, no te dejamos solo.</span></div>
    <div class="row"><span class="label">BASE 16</span><span class="sample" style="font-size:13px;font-weight:400;line-height:1.5;">Av. San Martín 2573, Rafael Calzada</span></div>
    <div class="row"><span class="label">SM 14</span><span class="sample" style="font-size:12px;font-weight:400;line-height:1.5;color:#888;">Lun a Vie · 07:30 a 22:00hs</span></div>
    <div class="row"><span class="label">XS 12</span><span class="sample" style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#888;">LABEL TEXT</span></div>
  </div>
</body>
</html>
