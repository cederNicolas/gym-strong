<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  body { margin: 0; padding: 24px; background: #0A0A0A; font-family: 'Montserrat', sans-serif; color: #fff; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .token {
    border-radius: 8px; padding: 14px; display: flex; align-items: center; gap: 12px;
  }
  .dot { width: 32px; height: 32px; border-radius: 6px; flex-shrink: 0; }
  .info { display: flex; flex-direction: column; }
  .tname { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #aaa; }
  .tval { font-size: 12px; font-weight: 600; margin-top: 2px; }
  .token { background: #1A1A1A; }
</style>
</head>
<body>
  <div class="grid">
    <div class="token"><div class="dot" style="background:#0A0A0A; border:1px solid #3A3A3A;"></div><div class="info"><span class="tname">bg-body</span><span class="tval">#0A0A0A</span></div></div>
    <div class="token"><div class="dot" style="background:#1A1A1A; border:1px solid #3A3A3A;"></div><div class="info"><span class="tname">bg-surface</span><span class="tval">#1A1A1A</span></div></div>
    <div class="token"><div class="dot" style="background:#2A2A2A;"></div><div class="info"><span class="tname">bg-raised</span><span class="tval">#2A2A2A</span></div></div>
    <div class="token"><div class="dot" style="background:#FFB800;"></div><div class="info"><span class="tname">bg-accent</span><span class="tval">#FFB800</span></div></div>
    <div class="token"><div class="dot" style="background:#FFFFFF;"></div><div class="info"><span class="tname">fg-primary</span><span class="tval">#FFFFFF</span></div></div>
    <div class="token"><div class="dot" style="background:#888888;"></div><div class="info"><span class="tname">fg-secondary</span><span class="tval">#888888</span></div></div>
    <div class="token"><div class="dot" style="background:#FFB800;"></div><div class="info"><span class="tname">fg-accent</span><span class="tval">#FFB800</span></div></div>
    <div class="token"><div class="dot" style="background:#3A3A3A;"></div><div class="info"><span class="tname">border-default</span><span class="tval">#3A3A3A</span></div></div>
    <div class="token"><div class="dot" style="background:#FFB800; border: 2px solid #E5A500;"></div><div class="info"><span class="tname">border-accent</span><span class="tval">#FFB800</span></div></div>
  </div>
</body>
</html>
