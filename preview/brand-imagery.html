<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  body { margin: 0; padding: 24px 28px; background: #0A0A0A; font-family: 'Montserrat', sans-serif; color: #fff; display: flex; gap: 16px; }
  .swatch {
    flex: 1; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column;
  }
  .img-area {
    height: 90px; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #888;
    position: relative;
  }
  .bw { background: #2A2A2A; filter: grayscale(100%); }
  .overlay { background: linear-gradient(135deg, rgba(255,184,0,0.3), rgba(10,10,10,0.8)); }
  .dark-overlay { background: linear-gradient(180deg, rgba(10,10,10,0.2), rgba(10,10,10,0.85)); }
  .accent-tint { background: linear-gradient(135deg, #FFB800, #E5A500); }
  .caption {
    background: #1A1A1A; padding: 10px 14px; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em; color: #888;
  }
  .img-placeholder {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    background: #2A2A2A; color: #555; font-size: 28px; font-weight: 900;
  }
</style>
</head>
<body>
  <div class="swatch">
    <div class="img-area bw"><div class="img-placeholder">B&W</div></div>
    <div class="caption">Grayscale photography</div>
  </div>
  <div class="swatch">
    <div class="img-area" style="background:#2A2A2A;">
      <div style="position:absolute;inset:0;background:linear-gradient(135deg, rgba(255,184,0,0.25), rgba(10,10,10,0.7));"></div>
      <span style="z-index:1;">Amber overlay</span>
    </div>
    <div class="caption">B&W + amber tint</div>
  </div>
  <div class="swatch">
    <div class="img-area" style="background:#2A2A2A;">
      <div style="position:absolute;inset:0;background:linear-gradient(180deg, rgba(10,10,10,0.1), rgba(10,10,10,0.85));"></div>
      <span style="z-index:1;color:#fff;font-size:16px;font-weight:900;">TEXT SAFE</span>
    </div>
    <div class="caption">Dark protection gradient</div>
  </div>
  <div class="swatch">
    <div class="img-area accent-tint">
      <span style="color:#0A0A0A;font-size:16px;font-weight:900;">BOLD CTA</span>
    </div>
    <div class="caption">Full-bleed accent</div>
  </div>
</body>
</html>
